<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Screenshot Tool</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        width: 220px;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
      }

      button {
        width: 100%;
        padding: 10px;
        font-size: 14px;
        cursor: pointer;
        border: none;
        border-radius: 6px;
        background: #007bff;
        color: white;
      }

      button:hover {
        background: #0056b3;
      }

      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #333;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <button id="captureBtn">
      Capture + Copy + Close
    </button>

    <div id="status"></div>

    <script>
      document.getElementById("captureBtn").addEventListener("click", async () => {
        const status = document.getElementById("status");
        status.textContent = "Processing...";

        try {
          const [tab] = await chrome.tabs.query({
            active: true,
            currentWindow: true
          });

          const dataUrl = await chrome.tabs.captureVisibleTab(
            tab.windowId,
            { format: "png" }
          );

          const response = await fetch(dataUrl);
          const blob = await response.blob();

          await navigator.clipboard.write([
            new ClipboardItem({
              "image/png": blob
            })
          ]);

          console.log("Screenshot copied to Windows clipboard.");
          status.textContent = "Copied! Closing tab...";

          setTimeout(() => {
            chrome.tabs.remove(tab.id);
          }, 500);

        } catch (err) {
          console.error("Error:", err);
          status.textContent = "Failed. See console.";
        }
      });
    </script>
  </body>
</html>
